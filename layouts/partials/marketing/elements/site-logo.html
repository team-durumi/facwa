{{- $ctx := . -}}
{{- if reflect.IsMap . -}}
  {{- with .Page -}}
    {{- $ctx = . -}}
  {{- end -}}
{{- end -}}
{{- $logo := $ctx.Site.Params.logo -}}
{{- $title := $ctx.Site.Title -}}
<a class="facwa-header-logo" href="/" aria-label="{{ $title }}">
  {{- if $logo -}}
    <img class="facwa-header-logo__image" src="{{ $logo | absURL }}" alt="{{ $title }}">
  {{- else -}}
    <span class="facwa-header-logo__text">{{ $title }}</span>
  {{- end -}}
</a>
